      );

    case 'pillar': {
      const colors = { indigo: { bg: '#eef2ff', border: '#a5b4fc', title: '#3730a3' }, emerald: { bg: '#ecfdf5', border: '#6ee7b7', title: '#065f46' }, amber: { bg: '#fffbeb', border: '#fcd34d', title: '#92400e' }, purple: { bg: '#faf5ff', border: '#c4b5fd', title: '#5b21b6' } };
      const c = colors[section.color] || colors.indigo;
      return (
        <div className="card p-5" style={{borderLeft: `4px solid ${c.border}`}}>
          <h3 className="text-base font-bold mb-4" style={{color: c.title, fontFamily: 'DM Serif Display, serif'}}>{section.title}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Comment faire ?</div>
              <ul className="space-y-2">
                {section.how.map((item, i) => (
                  <li key={i} className="flex items-start gap-2 text-sm text-slate-700">
                    <span className="text-emerald-500 mt-0.5 shrink-0">✓</span>{item}
                  </li>
                ))}
              </ul>
            </div>
            <div className="bg-red-50 rounded-xl p-4 border border-red-100">
              <div className="text-xs font-bold text-red-600 uppercase tracking-widest mb-2">Facteurs de risques</div>
              <ul className="space-y-2">
                {section.risks.map((item, i) => (
                  <li key={i} className="flex items-start gap-2 text-sm text-red-700">
                    <span className="mt-0.5 shrink-0">⚠</span>{item}
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>
      );
    }

    default:
      return null;
  }
};

/* ─── Quiz Multi-Questions ─── */
const QuizSection = ({ questions, onComplete }) => {
  const [current, setCurrent] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const [done, setDone] = React.useState(false);

  const q = questions[current];
  const answered = answers[current] !== undefined;
  const userAnswer = answers[current];
  const isCorrect = answered && (userAnswer === q.a);
  const score = Object.keys(answers).filter(k => answers[k] === questions[k].a).length;

  const handleAnswer = (val) => {
    if (answered) return;
    const newAnswers = { ...answers, [current]: val };
    setAnswers(newAnswers);
  };

  const handleNext = () => {
    if (current < questions.length - 1) {
      setCurrent(current + 1);
    } else {
      setDone(true);
      if (onComplete) onComplete(score + (answers[current] === q.a ? 1 : 0));
    }
  };

  const handleReset = () => {
    setCurrent(0);
    setAnswers({});
    setDone(false);
  };

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div className="card p-6 text-center">
        <div className="text-5xl mb-3">{pct >= 80 ? '🎉' : pct >= 60 ? '💪' : '📖'}</div>
        <h3 className="text-2xl font-bold text-slate-800 mb-2" style={{fontFamily: 'DM Serif Display, serif'}}>
          {score} / {questions.length} — {pct}%
        </h3>
        <p className="text-slate-600 mb-4">
          {pct >= 80 ? 'Excellent ! Vous maîtrisez ce module.' : pct >= 60 ? 'Bien ! Relisez les points manqués.' : 'À revoir ! Reprenez le cours sur ce module.'}
        </p>
        <div className="flex gap-2 justify-center flex-wrap mb-4">
          {questions.map((qu, i) => (
            <div key={i} className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold ${answers[i] === qu.a ? 'bg-emerald-500' : 'bg-red-400'}`}>
              {i+1}
            </div>
          ))}
        </div>
        <button onClick={handleReset} className="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors">
          Recommencer
        </button>
      </div>
    );
  }

  return (
    <div className="card p-6">
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <span className="text-sm font-bold text-slate-500">Question {current + 1}/{questions.length}</span>
          {q.piege && <span className="badge-piege">⚠️ Piège fréquent</span>}
        </div>
        <div className="flex gap-1">
          {questions.map((_, i) => (
            <div key={i} className={`w-2 h-2 rounded-full transition-all ${i === current ? 'bg-slate-700 w-6' : answers[i] !== undefined ? (answers[i] === questions[i].a ? 'bg-emerald-400' : 'bg-red-400') : 'bg-slate-200'}`}/>
          ))}
        </div>
      </div>

      <p className="text-slate-800 font-medium mb-6 leading-relaxed text-base">{q.q}</p>

      <div className="flex gap-3 mb-4">
        {[true, false].map((val) => {
          let cls = 'quiz-btn font-bold text-sm ';
          if (answered) {
            if (val === q.a) cls += 'correct';
            else if (val === userAnswer) cls += 'wrong';
            else cls += 'opacity-40';
          }
          return (
            <button key={String(val)} disabled={answered} onClick={() => handleAnswer(val)} className={cls + ' flex-1'}>
              {val ? '✓ Vrai' : '✗ Faux'}
            </button>
          );
        })}
      </div>

      {answered && (
        <div className={`rounded-xl p-4 mb-4 ${isCorrect ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
          <div className={`flex items-center gap-2 font-bold mb-2 ${isCorrect ? 'text-emerald-700' : 'text-red-700'}`}>
            {isCorrect ? <><CheckIcon /> Bonne réponse !</> : <><XIcon /> Incorrect — La bonne réponse est : {q.a ? 'VRAI' : 'FAUX'}</>}
          </div>
          <p className={`text-sm leading-relaxed ${isCorrect ? 'text-emerald-800' : 'text-red-800'}`}>{q.expl}</p>
        </div>
      )}

      {answered && (
        <div className="flex justify-end">
          <button onClick={handleNext} className="px-6 py-2 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors text-sm">
            {current < questions.length - 1 ? 'Question suivante →' : 'Voir les résultats →'}
          </button>
        </div>
      )}
    </div>
  );
};

/* ─── Main App ─── */
const App = () => {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [tab, setTab] = React.useState('cours');
  const [completedModules, setCompletedModules] = React.useState(new Set());
  const [mobileOpen, setMobileOpen] = React.useState(false);

  const mod = modules[activeIdx];
  const progress = Math.round((completedModules.size / modules.length) * 100);

  const handleModuleChange = (idx) => {
    setActiveIdx(idx);
    setTab('cours');
    setMobileOpen(false);
    window.scrollTo(0, 0);
  };

  return (
    <div className="min-h-screen flex flex-col md:flex-row">
      {/* Mobile header */}
      <div className="md:hidden sticky top-0 z-20 flex items-center justify-between px-4 py-3 shadow-md" style={{background: '#0b1829'}}>
        <div>
          <div className="text-white font-bold text-sm" style={{fontFamily: 'DM Serif Display, serif'}}>Intégration de Données</div>
          <div className="text-xs" style={{color: '#f0a500'}}>{mod.emoji} {mod.title}</div>
        </div>
        <button onClick={() => setMobileOpen(!mobileOpen)} className="text-white p-1">
          <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      {/* Sidebar */}
      <div className={`sidebar w-full md:w-72 flex-shrink-0 flex flex-col ${mobileOpen ? 'block' : 'hidden'} md:block md:sticky top-0 h-auto md:h-screen overflow-y-auto z-10`}>
        <div className="p-6 hidden md:block" style={{borderBottom: '1px solid #1e3a5f'}}>
          <h1 className="text-xl text-white font-bold leading-tight mb-1" style={{fontFamily: 'DM Serif Display, serif'}}>Intégration de Données</h1>
          <p className="text-xs" style={{color: '#f0a500'}}>M2 MIAGE IPM — Jiefu Song</p>
        </div>

        <div className="p-4" style={{borderBottom: '1px solid #1e3a5f'}}>
          <div className="flex justify-between text-xs mb-2">
            <span style={{color: '#94a3b8'}}>Progression</span>
            <span className="font-bold text-white">{progress}%</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{width: `${progress}%`}}/>
          </div>
          <div className="text-xs mt-2" style={{color: '#64748b'}}>{completedModules.size} / {modules.length} modules complétés</div>
        </div>

        <nav className="py-2 flex-1">
          {modules.map((m, i) => (
            <button key={m.id} onClick={() => handleModuleChange(i)}
              className={`nav-btn w-full text-left px-4 py-3.5 flex items-start gap-3 ${activeIdx === i ? 'active' : ''}`}>
              <span className="text-lg shrink-0 mt-0.5">{completedModules.has(m.id) ? '✅' : m.emoji}</span>
              <div>
                <div className={`text-xs font-bold mb-0.5 ${activeIdx === i ? 'text-amber-400' : 'text-slate-500'}`}>Module {i+1}</div>
                <div className={`text-sm leading-tight ${activeIdx === i ? 'text-white font-semibold' : 'text-slate-300'}`}>{m.title}</div>
              </div>
            </button>
          ))}
        </nav>
      </div>

      {/* Content */}
      <div className="flex-1 min-w-0 pb-16">
        <div className="max-w-3xl mx-auto px-4 md:px-8 py-8">

          {/* Module header */}
          <div className="mb-6">
            <div className="module-tag mb-2">Module {activeIdx + 1} / {modules.length}</div>
            <h2 className="text-3xl md:text-4xl font-bold text-slate-900 leading-tight mb-1" style={{fontFamily: 'DM Serif Display, serif'}}>
              {mod.emoji} {mod.title}
            </h2>
            <p className="text-slate-500">{mod.subtitle}</p>
          </div>

          {/* Tab switcher */}
          <div className="flex gap-2 mb-6 p-1 bg-slate-100 rounded-xl w-fit">
            <button onClick={() => setTab('cours')} className={`tab-btn ${tab === 'cours' ? 'active' : ''}`}>📖 Cours</button>
            <button onClick={() => setTab('quiz')} className={`tab-btn ${tab === 'quiz' ? 'active' : ''}`}>
              🎯 Quiz ({mod.quiz.length} questions)
            </button>
          </div>

          {/* Course content */}
          {tab === 'cours' && (
            <div className="space-y-4">
              {mod.content.sections.map((section, i) => (
                <SectionRenderer key={i} section={section} />
              ))}
              <div className="flex justify-center pt-4">
                <button
                  onClick={() => { setTab('quiz'); window.scrollTo(0, 0); }}
                  className="px-8 py-3 text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition-opacity text-sm"
                  style={{background: mod.color}}>
                  Tester mes connaissances →
                </button>
              </div>
            </div>
          )}

          {/* Quiz content */}
          {tab === 'quiz' && (
            <div className="space-y-4">
              <div className="card p-4 bg-slate-50 border-slate-200">
                <p className="text-sm text-slate-600">
                  <strong>{mod.quiz.length} questions</strong> Vrai/Faux tirées des concepts du cours.
                  Les questions marquées <span className="badge-piege">⚠️ Piège fréquent</span> sont celles qui font le plus d'erreurs.
                </p>
              </div>
              <QuizSection
                key={`${mod.id}-${tab}`}
                questions={mod.quiz}
                onComplete={(score) => {
                  if (score / mod.quiz.length >= 0.6) {
                    setCompletedModules(prev => new Set([...prev, mod.id]));
                  }
                }}
              />
            </div>
          )}

          {/* Navigation */}
          <div className="flex justify-between mt-8 pt-6 border-t border-slate-200">
            <button
              disabled={activeIdx === 0}
              onClick={() => handleModuleChange(activeIdx - 1)}
              className="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 disabled:opacity-30 transition-colors text-sm">
              ← Précédent
            </button>
            <button
              disabled={activeIdx === modules.length - 1}
              onClick={() => handleModuleChange(activeIdx + 1)}
              className="px-5 py-2.5 text-white rounded-xl font-bold hover:opacity-90 disabled:opacity-30 transition-opacity text-sm"
              style={{background: mod.color}}>
              Suivant →
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
